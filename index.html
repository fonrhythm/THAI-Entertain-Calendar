<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Chob泰娱行程日历</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#faf9f7;--surface:#fff;--border:#e8e4de;--border-soft:#f0ece6;
      --text:#1a1a1a;--sub:#6b6b6b;--muted:#999;--accent:#142b4b;
    }
    html,body{height:100%;height:100dvh;background:var(--bg)}
    body{font-family:'Noto Sans SC','Lato',sans-serif;color:var(--text);display:flex;flex-direction:column;position:relative}
    .main{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px 24px;z-index:2}
    .logo-wrap{display:inline-flex;flex-direction:column;align-items:center;gap:4px;text-align:center}
    .logo-en{font-family:'Lato',sans-serif;font-size:11px;font-weight:400;letter-spacing:5px;color:var(--muted);text-transform:uppercase}
    .logo-title{font-family:'Lato',sans-serif;font-size:52px;font-weight:700;letter-spacing:-2px;color:var(--text);line-height:1;margin:8px 0 4px}
    .logo-sub{font-family:'Lato',sans-serif;font-size:11px;font-weight:300;letter-spacing:4px;color:var(--muted);text-transform:uppercase}
    .divider{width:40px;height:1px;background:var(--border);margin:30px auto}
    .nav{display:flex;flex-direction:column;align-items:center;gap:12px;width:100%;max-width:420px}
    .nav-btn{display:flex;align-items:center;justify-content:space-between;width:100%;padding:16px 24px;background:var(--surface);border:1px solid var(--border);border-radius:12px;text-decoration:none;color:var(--text);font-family:'Lato',sans-serif;font-size:13px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;transition:background .15s,border-color .15s,transform .1s;pointer-events:auto}
    .nav-btn:hover{background:#f5f3f0;border-color:#d4cfc8;transform:translateX(3px)}
    .nav-btn .arrow{font-size:16px;color:var(--muted);transition:color .15s;font-weight:300;flex-shrink:0}
    .nav-btn:hover .arrow{color:var(--text)}
    .nav-btn .tag{font-size:9px;font-weight:400;letter-spacing:1px;color:var(--muted);background:var(--bg);border:1px solid var(--border-soft);border-radius:20px;padding:2px 8px;margin-left:10px;white-space:nowrap}
    .btn-left{display:flex;align-items:center;gap:10px}

    /* 登录状态区域 */
    .auth-links-wrap{display:flex;align-items:center;justify-content:center;gap:20px;margin-top:28px;width:100%}
    .auth-txt-link{text-decoration:none;font-family:'Lato',sans-serif;font-size:12px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--sub);transition:color .15s;cursor:pointer;background:none;border:none;padding:0;font-family:inherit}
    .auth-txt-link:hover{color:var(--text)}
    .auth-line-sep{width:1px;height:12px;background:var(--border)}

    /* 已登录状态 */
    .user-greeting{font-family:'Lato',sans-serif;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);display:flex;align-items:center;gap:8px}
    .user-avatar{width:22px;height:22px;border-radius:50%;object-fit:cover;border:1.5px solid var(--border)}
    .user-name{color:var(--sub);font-weight:700}

    footer{border-top:1px solid var(--border-soft);padding:14px 0;text-align:center;font-size:10px;color:var(--muted);background:var(--surface);flex-shrink:0;z-index:1}

    @media(max-width:480px){
      .main{padding:15px 20px}
      .logo-title{font-size:38px}
      .divider{margin:15px auto}
      .nav-btn{padding:12px 18px;font-size:12px}
      .nav{gap:8px}
      .auth-links-wrap{margin-top:20px}
    }
    @media(max-height:660px){
      .logo-title{font-size:32px}
      .divider{margin:10px auto}
      .nav-btn{padding:10px 16px}
      .nav{gap:6px}
      .auth-links-wrap{margin-top:14px}
    }
  </style>
</head>
<body>

<main class="main">
  <div class="logo-wrap">
    <span class="logo-en">Thai Artist</span>
    <div class="logo-title">Chob</div>
    <span class="logo-sub">Calendar</span>
  </div>

  <div class="divider"></div>

  <nav class="nav">
    <a class="nav-btn" href="/china-calendar/">
      <div class="btn-left">China Schedule<span class="tag">来华行程</span></div>
      <span class="arrow">→</span>
    </a>
    <a class="nav-btn" href="/thai-calendar/">
      <div class="btn-left">Thailand Schedule<span class="tag">泰国行程</span></div>
      <span class="arrow">→</span>
    </a>
    <a class="nav-btn" href="/oversea-calendar/">
      <div class="btn-left">Oversea Schedule<span class="tag">海外行程</span></div>
      <span class="arrow">→</span>
    </a>
    <a class="nav-btn" href="/About/">
      <div class="btn-left">about<span class="tag">联系我</span></div>
      <span class="arrow">→</span>
    </a>

    <!-- 登录状态区域，JS 控制显示 -->
    <div class="auth-links-wrap" id="auth-area">
      <!-- 未登录时显示 -->
      <div id="auth-guest" style="display:flex;align-items:center;gap:20px">
        <a class="auth-txt-link" href="/login/">Login</a>
        <div class="auth-line-sep"></div>
        <a class="auth-txt-link" href="/register/">Register</a>
      </div>
      <!-- 已登录时显示 -->
      <div id="auth-user" style="display:none;align-items:center;gap:16px">
        <div class="user-greeting">
          <img class="user-avatar" id="user-avatar" src="" alt="" onerror="this.style.display='none'">
          <span id="user-name" class="user-name"></span>
        </div>
        <div class="auth-line-sep"></div>
        <button class="auth-txt-link" onclick="handleSignOut()">登出</button>
      </div>
    </div>
  </nav>
</main>

<footer>Copyright &copy; 2026 — All rights reserved by SomenStjerne</footer>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getAuth, onAuthStateChanged, signOut }
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';

const firebaseConfig = {
  apiKey: "AIzaSyAv4v5B1HXotOABmIcc5TOi3uzqPmLnvNs",
  authDomain: "chob-calendar.firebaseapp.com",
  projectId: "chob-calendar",
  storageBucket: "chob-calendar.firebasestorage.app",
  messagingSenderId: "629896393980",
  appId: "1:629896393980:web:d8800df187ba495b895379"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

onAuthStateChanged(auth, user => {
  const guest = document.getElementById('auth-guest');
  const userEl = document.getElementById('auth-user');
  if (user) {
    guest.style.display = 'none';
    userEl.style.display = 'flex';
    const name = user.displayName || user.email.split('@')[0];
    document.getElementById('user-name').textContent = name;
    const avatar = document.getElementById('user-avatar');
    if (user.photoURL) { avatar.src = user.photoURL; avatar.style.display = 'block'; }
    else avatar.style.display = 'none';
  } else {
    guest.style.display = 'flex';
    userEl.style.display = 'none';
  }
});

window.handleSignOut = async function() {
  await signOut(auth);
};
</script>
</body>
</html>
