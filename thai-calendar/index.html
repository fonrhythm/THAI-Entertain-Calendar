<!DOCTYPE html>
<html lang="zh-CN">
<head>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thailand Calendar — Chob Calendar</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700&family=Lato:wght@300;400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.47.0/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#faf9f7;--surface:#fff;--border:#e8e4de;--border-soft:#f0ece6;
  --text:#1a1a1a;--sub:#6b6b6b;--muted:#999;
  --c-bl:#142b4b;--t-bl:#fff;
  --c-gl:#d7ccba;--t-gl:#7a5c3a;
  --c-band:#2b4779;--t-band:#fff;
  --c-singer:#c4b59c;--t-singer:#fff;
  --c-group:#6e8dbb;--t-group:#fff;
  --c-actor:#d0c5af;--t-actor:#fff;
  --c-other:#9db1ca;--t-other:#fff;
}
body{font-family:'Noto Sans SC','Lato',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column}
.wrap{max-width:1100px;margin:0 auto;padding:0 24px;width:100%}
.sticky-shell{position:fixed;top:0;left:0;right:0;z-index:200;background:var(--surface);box-shadow:0 2px 8px rgba(0,0,0,.06)}
.site-nav{background:var(--surface);border-bottom:1px solid var(--border-soft);padding:8px 0}
.site-nav-inner{display:flex;align-items:center;gap:4px;flex-wrap:nowrap;overflow-x:auto;-webkit-overflow-scrolling:touch}
.site-nav a{font-family:'Lato',sans-serif;font-size:10px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:var(--muted);text-decoration:none;padding:4px 6px;border-radius:6px;transition:color .15s,background .15s;white-space:nowrap;flex-shrink:0}
.site-nav a:hover{color:var(--text);background:var(--bg)}
.site-nav a.active{color: var(--text);font-weight: 700;}
.sep{color:#bbb;font-size:10px;flex-shrink:0}
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:20px 0 16px}
.header-inner{display:flex;align-items:center}
.nav-btn{background:none;border:none;cursor:pointer;width:36px;color:var(--muted);font-size:17px;display:flex;align-items:center;justify-content:center;align-self:stretch;border-radius:6px;transition:color .15s,background .15s;flex-shrink:0}
.nav-btn:hover{color:var(--text);background:var(--bg)}
.month-block{flex:1;padding:0 6px}
.year-lbl{font-family:'Lato',sans-serif;font-size:11px;font-weight:300;color:var(--muted);letter-spacing:3px;margin-bottom:1px}
.month-row{display:flex;align-items:baseline;gap:10px;line-height:1}
.month-cn{font-size:72px;font-weight:700;color:var(--text);line-height:.88;letter-spacing:-2px}
.month-en{font-family:'Lato',sans-serif;font-size:32px;font-weight:300;color:#888;letter-spacing:1px}
.toolbar{background:var(--surface);border-bottom:1px solid var(--border);padding:9px 0}
.toolbar-inner{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.view-group{display:flex;gap:2px;background:var(--bg);border:1px solid var(--border);border-radius:20px;padding:3px;flex-shrink:0}
.view-btn{background:none;border:none;padding:4px 13px;border-radius:16px;font-size:12px;font-weight:500;font-family:inherit;cursor:pointer;color:var(--sub);transition:all .15s;white-space:nowrap}
.view-btn.active{background:var(--text);color:#fff}
.tb-div{width:1px;height:22px;background:var(--border);flex-shrink:0}
.pills{display:flex;gap:5px;flex-wrap:wrap;flex:1}
.pill{border:1.5px solid transparent;border-radius:20px;padding:3px 11px;font-size:11px;font-weight:500;font-family:inherit;cursor:pointer;display:flex;align-items:center;gap:4px;transition:all .15s;white-space:nowrap;opacity:.42}
.pill.on{opacity:1;box-shadow:0 1px 4px rgba(0,0,0,.1)}
.pill .dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;background:rgba(0,0,0,0.18)}
.p-bl{background:var(--c-bl);color:var(--t-bl);border-color:var(--c-bl)}
.p-bl .dot{background:rgba(0,0,0,0.45)}
.p-gl{background:var(--c-gl);color:var(--t-gl);border-color:var(--c-gl)}
.p-band{background:var(--c-band);color:var(--t-band);border-color:var(--c-band)}
.p-band .dot{background:rgba(0,0,0,0.45)}
.p-singer{background:var(--c-singer);color:var(--t-singer);border-color:var(--c-singer)}
.p-group{background:var(--c-group);color:var(--t-group);border-color:var(--c-group)}
.p-actor{background:var(--c-actor);color:var(--t-actor);border-color:var(--c-actor)}
.p-other{background:var(--c-other);color:var(--t-other);border-color:var(--c-other)}
.sync{margin-left:auto;font-size:11px;color:var(--muted);display:flex;align-items:center;gap:4px;flex-shrink:0}
.sync-dot{width:6px;height:6px;border-radius:50%;background:#4caf50;flex-shrink:0}
.sync-dot.busy{background:#fb8c00;animation:blink 1s infinite}
.sync-dot.err{background:#e53935}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.page-content{padding-top:0}
.stats{display:grid;grid-template-columns:repeat(4,1fr);border:1px solid var(--border);border-radius:12px;overflow:hidden;background:var(--surface);box-shadow:0 1px 3px rgba(0,0,0,.05)}
.stat{padding:13px 16px;text-align:center;border-right:1px solid var(--border-soft)}
.stat:last-child{border-right:none}
.stat-n{font-size:26px;font-weight:700;font-family:'Lato',sans-serif;line-height:1}
.stat-l{font-size:10px;color:var(--muted);margin-top:4px;letter-spacing:.3px}
.cal{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.05);margin-bottom:0;border-bottom:10px solid var(--border)}
.dow-row{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));border-bottom:1px solid var(--border-soft)}
.dow{text-align:center;padding:8px 0;font-size:10px;font-weight:500;letter-spacing:1.5px;color:var(--muted);border-right:1px solid var(--border-soft);overflow:hidden}
.dow:last-child{border-right:none}
.dow.sun{color:#c0524e}.dow.sat{color:#5E7B9B}
.cal-grid{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));grid-auto-rows:110px}
.cell{overflow:hidden;min-width:0;min-height:0;padding:6px 5px 4px;border-right:1px solid var(--border-soft);border-bottom:1px solid var(--border-soft);background:var(--surface);transition:background .1s;display:flex;flex-direction:column}
.cell:nth-child(7n){border-right:none}
.cell.empty{background:#fcfbf9}.cell.today{background:#fffbf5}
.cell.past-day{opacity:.5}
.cell:not(.empty):hover{background:#fdfcfa}
.cell-num{font-size:11px;width:20px;height:20px;display:flex;align-items:center;justify-content:center;border-radius:50%;color:var(--sub);flex-shrink:0;margin-bottom:2px}
.cell-num.sun{color:#c0524e}.cell-num.sat{color:#5E7B9B}
.today .cell-num{background:var(--text);color:#fff;font-weight:700}
.chip{font-size:10px;padding:2px 5px;border-radius:4px;margin-bottom:2px;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.5;flex-shrink:0;min-width:0;width:100%;border:none;text-align:left;font-family:inherit;transition:filter .1s,opacity .3s ease;display:block}
.chip.bl{background:var(--c-bl);color:var(--t-bl)}
.chip.gl{background:var(--c-gl);color:var(--t-gl)}
.chip.band{background:var(--c-band);color:var(--t-band)}
.chip.singer{background:var(--c-singer);color:var(--t-singer)}
.chip.group{background:var(--c-group);color:var(--t-group)}
.chip.actor{background:var(--c-actor);color:var(--t-actor)}
.chip.other{background:var(--c-other);color:var(--t-other)}
.chip.cancelled{opacity:.38!important;text-decoration:line-through;position:relative}
.chip.cancelled::after{content:'已取消';position:absolute;top:2px;right:4px;font-size:8px;line-height:1;padding:2px 4px;border-radius:10px;background:rgba(0,0,0,.55);color:#fff;text-decoration:none}
.more{font-size:9px;color:var(--muted);cursor:pointer;white-space:nowrap;overflow:hidden;flex-shrink:0;padding:0 2px;display:block}
.more:hover{color:var(--text)}
.coming-soon-wrap{display:flex;justify-content:center;padding:10px 0 10px}
.coming-soon-badge{display:inline-flex;align-items:center;gap:7px;background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:7px 18px;font-family:'Lato',sans-serif;font-size:11px;font-weight:400;letter-spacing:2px;text-transform:uppercase;color:var(--muted);cursor:pointer;text-decoration:none;box-shadow:0 1px 4px rgba(0,0,0,.04);transition:border-color .2s,color .2s}
.coming-soon-badge:hover{border-color:#c9b8a8;color:var(--sub)}
.coming-soon-badge .cs-dot{display:none}
@keyframes cs-pulse{0%,100%{opacity:.4;transform:scale(.85)}50%{opacity:1;transform:scale(1.15)}}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:#1a1a1a;color:#fff;border-radius:10px;padding:11px 18px;font-size:12px;display:flex;align-items:center;gap:10px;box-shadow:0 4px 20px rgba(0,0,0,.25);opacity:0;transition:opacity .25s,transform .25s;z-index:999;max-width:90vw;text-align:center}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.overlay{display:none;position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,.35);align-items:center;justify-content:center;padding:16px;overscroll-behavior:contain}
#day-overlay{z-index:900!important}
.overlay.open{display:flex}
.modal{background:#fff;border-radius:16px;width:380px;max-width:100%;position:relative;display:flex;flex-direction:column;max-height:60vh}
.modal-bar{height:8px;flex-shrink:0;border-radius:16px 16px 0 0}
.modal-body{padding:20px 20px 14px;overflow-y:auto;flex:1;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.modal-body::-webkit-scrollbar{display:none}
.modal-x{position:absolute;top:13px;right:13px;width:26px;height:26px;border-radius:50%;border:none;background:rgba(0,0,0,.06);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--sub)}
.modal-badge{display:inline-block;border-radius:20px;padding:3px 10px;font-size:10px;font-weight:500;margin-bottom:10px}
.modal-name{font-size:18px;font-weight:700;margin-bottom:3px;line-height:1.3}
.modal-date{font-size:12px;color:var(--sub);margin-bottom:13px}
.modal-row{display:flex;align-items:flex-start;gap:8px;margin-bottom:8px;font-size:12px;color:var(--sub)}
.modal-row span{color:var(--text)}
.modal-foot{border-top:1px solid var(--border-soft);padding:12px 20px 16px;display:flex;flex-direction:column;gap:7px;flex-shrink:0}
.btn{display:block;width:100%;padding:10px;border-radius:8px;font-family:inherit;font-size:13px;font-weight:500;cursor:pointer;border:none;text-align:center}
.btn-dark{background:var(--text);color:#fff}
.btn-ghost{background:var(--bg);color:var(--text);border:1px solid var(--border)}
.ticket-info{font-size:12px;color:var(--sub);text-align:center;padding:6px 0;display:none}
footer{margin-top:auto;border-top:1px solid var(--border-soft);padding:14px 0;text-align:center;font-size:10px;color:var(--muted);background:var(--surface)}
@media(max-width:768px){
  .site-nav-inner{gap:3px;padding:0 8px}
  .site-nav a{font-size:10px;letter-spacing:.8px;padding:4px 8px}
  .stats{grid-template-columns:repeat(2,1fr)}
  .stat:nth-child(2){border-right:none}
  .stat:nth-child(3),.stat:nth-child(4){border-top:1px solid var(--border-soft)}
  .cal-grid{grid-auto-rows:82px}
}
@media(max-width:480px){
  .wrap{padding:0 10px}
  .month-cn{font-size:50px;letter-spacing:-1px}
  .month-en{font-size:20px}
  .header{padding:14px 0 10px}
  .toolbar-inner{flex-wrap:wrap}
  .tb-div{display:none}
  .pills{order:3;flex-basis:100%;flex-wrap:nowrap;overflow-x:auto;padding-bottom:2px;-webkit-overflow-scrolling:touch}
  .sync{order:2}.view-group{order:1}
  .cal-grid{grid-auto-rows:62px}
  .cell{padding:1px 2px 2px}
  .cell-num{font-size:10px;width:15px;height:15px;margin-bottom:1px;display:flex;align-items:center;justify-content:center;line-height:1;padding:0}
  .chip{font-size:9px;padding:1px 2px;letter-spacing:0;margin-bottom:1.5px;width:100%;overflow:hidden;text-overflow:ellipsis;display:block;line-height:11px;white-space:nowrap}
  .more{font-size:9px;line-height:1;color:var(--muted);padding:1px;display:block;width:100%!important;overflow:hidden;text-overflow:ellipsis;white-space:nowrap!important;transform:scale(1);transform-origin:left center;margin-top:2px}
  .dow{font-size:9px;letter-spacing:.3px}
  .overlay{padding:16px;align-items:center;justify-content:center}
  .modal{width:90%;max-width:380px;border-radius:16px}
}
</style>
</head>
<body>
<div class="sticky-shell">
  <div class="site-nav">
    <div class="wrap">
      <div class="site-nav-inner">
  <a href="/">Chob Calendar</a><span class="sep">›</span>

</div>

        </div>
        <div class="tb-div"></div>
        <div class="pills">
          <button class="pill p-bl on" onclick="toggleTag(this,'bl')"><span class="dot"></span>泰腐</button>
          <button class="pill p-gl on" onclick="toggleTag(this,'gl')"><span class="dot"></span>泰百</button>
          <button class="pill p-band on" onclick="toggleTag(this,'band')"><span class="dot"></span>乐队</button>
          <button class="pill p-singer on" onclick="toggleTag(this,'singer')"><span class="dot"></span>歌手</button>
          <button class="pill p-group on" onclick="toggleTag(this,'group')"><span class="dot"></span>男女团</button>
          <button class="pill p-actor on" onclick="toggleTag(this,'actor')"><span class="dot"></span>演员</button>
          <button class="pill p-other on" onclick="toggleTag(this,'other')"><span class="dot"></span>其他艺人</button>

  </div>
</div>

<div class="page-content" id="page-content">
  <div class="wrap" style="flex:1;padding-top:16px">
    <div class="stats" style="margin:0px 0 12px">
      <div class="stat"><div class="stat-n" id="s-0">—</div><div class="stat-l">站台活动</div></div>
      <div class="stat"><div class="stat-n" id="s-1">—</div><div class="stat-l">剧集宣传</div></div>
      <div class="stat"><div class="stat-n" id="s-2">—</div><div class="stat-l">舞台演出</div></div>

      <div class="dow-row">
        <div class="dow sun">SUN</div><div class="dow">MON</div><div class="dow">TUE</div>
        <div class="dow">WED</div><div class="dow">THU</div><div class="dow">FRI</div><div class="dow sat">SAT</div>
      </div>
      <div class="cal-grid" id="grid"></div>
    </div>
    <div class="coming-soon-wrap"><a href="/About/" class="coming-soon-badge">About</a></div>

</div>

<div class="toast" id="toast"><i class="ti ti-bell-check"></i><span id="toast-msg"></span></div>

<div class="overlay" id="overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-bar" id="m-bar"></div>

      <button class="modal-x" onclick="closeModal()"><i class="ti ti-x"></i></button>

<div class="overlay" id="day-overlay" onclick="if(event.target===this)closeDayModal()">
<div class="modal" style="max-height:60vh;display:flex;flex-direction:column">
    <div style="padding:20px 20px 16px;flex-shrink:0;border-bottom:1px solid var(--border-soft);position:relative">
      <button class="modal-x" onclick="closeDayModal()"><i class="ti ti-x"></i></button>
      <div class="modal-name" id="day-modal-title">日期详情</div>

<script>
const CN_M=['一月','二月','三月','四月','五月','六月','七月','八月','九月','十月','十一月','十二月'];
const EN_M=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const CAT={
  bl:{label:'泰腐',bg:'#142b4b',fg:'#fff'},
  gl:{label:'泰百',bg:'#d7ccba',fg:'#fff'},
  band:{label:'乐队',bg:'#2b4779',fg:'#fff'},
  singer:{label:'歌手',bg:'#c4b59c',fg:'#fff'},
  group:{label:'男女团',bg:'#6e8dbb',fg:'#fff'},
  actor:{label:'演员',bg:'#d0c5af',fg:'#fff'},
  other:{label:'其他艺人',bg:'#9db1ca',fg:'#fff'}
};
const ALL_TAGS=['bl','gl','band','singer','group','actor','other'];
const SHEET_ID = '1UvY0Fd5lmgRhPlSdIKn1Clfywo3yU7qcrLTwrRWosuU';
const SECRET_KEY = 'TheNorthRemembers';
const BASE_CSV_URL = `https://script.google.com/macros/s/AKfycbyVIlDJ1YoJfmZZnY1lt04te7iMPIdObqBBnu_iWQ6vp4K2SjXKmFustTynhMjsb-Zv/exec?id=${SHEET_ID}&origin=chobcalendar.pages.dev&key=${SECRET_KEY}`;
const STAT_TYPES=['站台活动','剧集宣传','舞台演出','其他'];

const _now = new Date();
let yr = _now.getFullYear();
let mo = _now.getMonth() + 1; 
let view = 'perform', events = [];
let active = new Set(ALL_TAGS);
const loadedRanges = []; // [{start:'yyyy-mm-dd', end:'yyyy-mm-dd'}]
let loadSeq = 0;


function updateHeader(){document.getElementById('y-lbl').textContent=yr;document.getElementById('m-cn').textContent=CN_M[mo-1];document.getElementById('m-en').textContent=EN_M[mo-1]}
function changeMonth(d){
  mo+=d;if(mo>12){mo=1;yr++}if(mo<1){mo=12;yr--}
  updateHeader();
  render();
  ensureMonthLoaded(yr,mo);
}
function setView(btn,v){view=v;document.querySelectorAll('.view-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');render()}
function toggleTag(btn,t){
  if(active.size===ALL_TAGS.length){active=new Set([t])}
  else{active.has(t)?active.delete(t):active.add(t)}
  if(active.size===0||active.size===ALL_TAGS.length)active=new Set(ALL_TAGS);
  document.querySelectorAll('.pill').forEach(p=>{const tag=p.getAttribute('onclick').match(/'([^']+)'\s*\)/)[1];p.classList.toggle('on',active.has(tag))});
  render();
}
function getDate(ev){return view==='sale'?(ev.sale_date||'').trim()||null:(ev.date||'').trim()||null}

function render(){
  const isMobile=window.innerWidth<480,limit=isMobile?2:3;
  const mo_evs=events.filter(ev=>{const d=new Date(ev.date);return d.getFullYear()===yr&&d.getMonth()+1===mo});
  STAT_TYPES.forEach((t,i)=>document.getElementById('s-'+i).textContent=mo_evs.filter(e=>(e.type||'')===t).length);
  const vis=events.filter(ev=>{
    if(!active.has(ev.category))return false;
    const ds=getDate(ev);if(!ds)return false;
    const d=new Date(ds.split(' ')[0]);return d.getFullYear()===yr&&d.getMonth()+1===mo;
  });
  const byDay={};
  vis.forEach(ev=>{const dv=getDate(ev);if(dv){const d=parseInt(dv.split('-')[2]);(byDay[d]=byDay[d]||[]).push(ev)}});
  const fd=new Date(yr,mo-1,1).getDay(),dim=new Date(yr,mo,0).getDate();
  const tod=new Date(),isNow=tod.getFullYear()===yr&&tod.getMonth()+1===mo;
  let html='';
  for(let i=0;i<fd;i++)html+='<div class="cell empty"></div>';
  for(let d=1;d<=dim;d++){
    const dow=(fd+d-1)%7,isT=isNow&&d===tod.getDate(),evs=byDay[d]||[];
    const nc=dow===0?'sun':dow===6?'sat':'';
    const currentLoopDate=new Date(yr,mo-1,d),todayZero=new Date(tod.getFullYear(),tod.getMonth(),tod.getDate());
    const isPast=currentLoopDate<todayZero;
    const hasMore=evs.length>3;
    const maxVisible=hasMore?(isMobile?2:3):(isMobile?3:4);
    const encAll=encodeURIComponent(JSON.stringify(evs));
    const cellAttrs=hasMore?`data-evs="${encAll}" onclick="openDayModal(${d},this.getAttribute('data-evs'))" style="cursor:pointer"`:'';
    let cellClass='cell';
    if(isT)cellClass+=' today';else if(isPast)cellClass+=' past-day';
    html+=`<div class="${cellClass}" ${cellAttrs}><div class="cell-num ${nc}">${d}</div>`;
    evs.slice(0,maxVisible).forEach(ev=>{
      const enc=btoa(encodeURIComponent(JSON.stringify(ev)));
      const opStyle=view==='sale'?'opacity:0.68;':'';
      html+=hasMore
        ?`<button class="chip ${ev.category}${ev.status==='cancelled'?' cancelled':''}" style="pointer-events:none;${opStyle}">${ev.name}</button>`
        :`<button class="chip ${ev.category}${ev.status==='cancelled'?' cancelled':''}" style="${opStyle}" onclick="event.stopPropagation();openModal('${enc}')">${ev.name}</button>`;
    });
    if(hasMore)html+=`<span class="more">还有 ${evs.length-maxVisible} 个活动</span>`;
    html+='</div>';
  }
  const rem=(fd+dim)%7;if(rem>0)for(let i=rem;i<7;i++)html+='<div class="cell empty"></div>';
  document.getElementById('grid').innerHTML=html;
}

function openDayModal(day,encEvs){
  const dayEvs=JSON.parse(decodeURIComponent(encEvs));
  document.getElementById('day-modal-title').textContent=`${mo}月${day}日 全部活动`;
  document.getElementById('day-modal-count').textContent=`共 ${dayEvs.length} 个行程`;
  const prefix=view==='sale'?'[开售] ':'';
  document.getElementById('day-events-list').innerHTML=dayEvs.map(ev=>{
    const enc=btoa(encodeURIComponent(JSON.stringify(ev)));
    return`<button class="chip ${ev.category}${ev.status==='cancelled'?' cancelled':''}" style="margin-bottom:12px;padding:10px 14px;font-size:14px;line-height:1.5;;white-space:normal;text-align:left;width:100%;border-radius:8px;" onclick="event.stopPropagation();openModal('${enc}')">${prefix}${ev.name}</button>`;
  }).join('');
  document.getElementById('day-overlay').classList.add('open');
}
function closeDayModal(){document.getElementById('day-overlay').classList.remove('open')}

function openModal(enc){
  const ev=JSON.parse(decodeURIComponent(atob(enc)));
  const cat=CAT[ev.category]||CAT.other;
  document.getElementById('m-bar').style.background=cat.bg;
  const badge=document.getElementById('m-badge');badge.textContent=cat.label;badge.style.background=cat.bg;badge.style.color=cat.fg;
  const namePart=ev.name||'',actPart=ev.activity||'';
  document.getElementById('m-name').textContent=namePart&&actPart?`${namePart} | ${actPart}`:namePart||actPart||'';
  if(ev.date){const d=new Date(ev.date);document.getElementById('m-date').textContent=`${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日`}
  else document.getElementById('m-date').textContent='日期待定';
  document.getElementById('m-venue').innerHTML=`${ev.venue||'待公布'}${ev.city?' · '+ev.city:''}`.replace(/\n/g,'<br>');
  document.getElementById('m-price').textContent=ev.price||'';
  document.getElementById('m-time').textContent=ev.time||'待公布';
  const saleRow=document.getElementById('m-sale-row');
if(ev.sale_date){
  const sd=new Date(ev.sale_date);
  if(!isNaN(sd.getTime())){
    const st=ev.sale_time?` ${ev.sale_time}`:'';
    document.getElementById('m-sale').textContent=`开售：${sd.getFullYear()}年${sd.getMonth()+1}月${sd.getDate()}日${st}`;
    saleRow.style.display='flex';
  } else {
    saleRow.style.display='none';
  }
} else saleRow.style.display='none';
  const nr=document.getElementById('m-note-row');
  if(ev.note){document.getElementById('m-note').innerHTML=ev.note.replace(/\n/g,'<br>');nr.style.display='flex'}else{nr.style.display='none'}
  const buyBtn=document.getElementById('m-buy'),tInfo=document.getElementById('m-ticket-info'),url=(ev.ticket_url||'').trim(),ttype=(ev.ticket_type||'').trim().toLowerCase();
  buyBtn.style.display='none';tInfo.style.display='none';
  if(ttype==='buy'&&url){buyBtn.textContent='立即购票 →';buyBtn.style.display='block';tInfo.style.display='none';buyBtn.onclick=()=>window.open(url,'_blank')}
  else if(ttype==='form'&&url){buyBtn.textContent='填写报名表 →';buyBtn.style.display='block';tInfo.style.display='none';buyBtn.onclick=()=>window.open(url,'_blank')}
  else if(ttype==='info'&&url){buyBtn.style.display='none';tInfo.style.display='block';tInfo.innerHTML=url.replace(/\n/g,'<br>')}
  document.getElementById('m-remind').onclick=()=>addToCalendar(ev);
  document.getElementById('overlay').classList.add('open');
}
function closeModal(){document.getElementById('overlay').classList.remove('open')}

function addToCalendar(ev){
  const saleDateStr=ev.sale_date||ev.date,saleTimeStr=ev.sale_time||'10:00';
  const[sh,sm]=(saleTimeStr+':00').split(':').map(Number);
  const sd=new Date(saleDateStr);sd.setHours(sh,sm,0,0);
  const ed=new Date(sd.getTime()+30*60000);
  const title=`[开售提醒] ${ev.activity||ev.name}`;
  const desc=`演出日期：${ev.date}\n场地：${ev.venue||''}${ev.city?'，'+ev.city:''}\n票价：${ev.price||'免费'}`;
  const fmt=dt=>dt.toISOString().replace(/[-:]/g,'').replace(/\.\d{3}/,'');
  const ics=['BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//SomenStjerne//ChobCalendar//EN','BEGIN:VEVENT',
    `UID:${Date.now()}@somenstjerne`,`DTSTAMP:${fmt(new Date())}`,`DTSTART:${fmt(sd)}`,`DTEND:${fmt(ed)}`,
    `SUMMARY:${title}`,`DESCRIPTION:${desc}`,'BEGIN:VALARM','TRIGGER:-PT0M','ACTION:DISPLAY',
    `DESCRIPTION:${title}`,'END:VALARM','END:VEVENT','END:VCALENDAR'].join('\r\n');
  const a=Object.assign(document.createElement('a'),{href:URL.createObjectURL(new Blob([ics],{type:'text/calendar;charset=utf-8'})),download:`${(ev.name||'提醒').replace(/\s/g,'_')}_开售提醒.ics`});
  document.body.appendChild(a);a.click();setTimeout(()=>{document.body.removeChild(a);URL.revokeObjectURL(a.href)},1000);
  closeModal();showToast(`已下载「${ev.activity||ev.name}」开售提醒`);
}

let toastTimer=null;
function showToast(msg){const t=document.getElementById('toast');document.getElementById('toast-msg').textContent=msg;t.classList.add('show');if(toastTimer)clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove('show'),4500)}

function setSyncState(s){
  const dot=document.getElementById('sync-dot'),txt=document.getElementById('sync-txt');
  dot.className='sync-dot'+(s==='busy'?' busy':s==='err'?' err':'');
  if(s==='err')txt.innerHTML=`同步失败 <a href="#" onclick="loadFromSheets();return false" style="color:#e53935;text-decoration:underline;margin-left:4px">重试</a>`;
  else txt.textContent=s==='ok'?'已同步':'同步中…';
}

function setContentOffset(){
  const shell=document.querySelector('.sticky-shell'),content=document.getElementById('page-content');
  if(shell&&content)content.style.paddingTop=shell.offsetHeight+'px';
}

function fmtYMD(d){
  const y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,'0'),dd=String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${dd}`;
}

function rangeCovered(startStr,endStr){
  return loadedRanges.some(r=>r.start<=startStr&&r.end>=endStr);
}

function mergeEvents(newRows){
  const seen=new Set(events.map(e=>JSON.stringify(e)));
  newRows.forEach(row=>{
    const key=JSON.stringify(row);
    if(!seen.has(key)){events.push(row);seen.add(key)}
  });
}

async function fetchRange(startStr,endStr){
  const url=`${BASE_CSV_URL}&start=${startStr}&end=${endStr}`;
  const r=await fetch(url);
  if(!r.ok) throw new Error(`HTTP ${r.status}`);
  const data=await r.json();
  if(data && data.error) throw new Error(data.error);
  if(!Array.isArray(data)) throw new Error('unexpected response');
  return data.map(row=>{
    const obj={};
    Object.keys(row).forEach(k=>{
      obj[k.trim().toLowerCase()]=typeof row[k]==='string'?row[k].trim():String(row[k]??'');
    });
    return {...obj,category:(obj.category||'').toLowerCase(),status:(obj.status||'').toLowerCase()};
  }).filter(o=>o.date||o.sale_date);
}

// 确保当前所在月份（含前后各1个月缓冲）已加载数据，未加载则补拉
async function ensureMonthLoaded(y,m){
  const from=new Date(y,m-2,1);
  const to=new Date(y,m+1,0);
  const startStr=fmtYMD(from),endStr=fmtYMD(to);
  if(rangeCovered(startStr,endStr))return;
  const mySeq=++loadSeq;
  setSyncState('busy');
  try{
    const rows=await fetchRange(startStr,endStr);
    if(mySeq!==loadSeq)return; // 有更新的请求已经发出，丢弃过期结果
    mergeEvents(rows);
    loadedRanges.push({start:startStr,end:endStr});
    setSyncState('ok');
    render();
    requestAnimationFrame(()=>setContentOffset());
  }catch(e){
    console.error('Load failed:',e);
    if(mySeq===loadSeq)setSyncState('err');
    render();
  }
}

async function loadFromSheets(){
  await ensureMonthLoaded(yr,mo);
}

updateHeader();
loadFromSheets();
window.addEventListener('resize',()=>{setContentOffset();render()});
// 多次尝试 offset 计算，确保字体和图标加载完毕后也正确
requestAnimationFrame(()=>{
  setContentOffset();
  setTimeout(setContentOffset,300);
  setTimeout(setContentOffset,800);
});
</script>
